<style>
 /* Background notes */
.music-background {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}

.note {
  position: absolute;
  top: -100px;
  font-size: 56px;
  color: rgba(247, 215, 116, 0.28);
  text-shadow: 0 0 18px rgba(247, 215, 116, 0.35);
  animation: fall linear infinite;
}

@keyframes fall {
  0% {
    transform: translateY(-100px) rotate(0deg);
    opacity: 0;
  }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% {
    transform: translateY(120vh) rotate(360deg);
    opacity: 0;
  }
}

/* Keep content above notes */
header,
main,
footer {
  position: relative;
  z-index: 1;
}

/* Header */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
  background: rgba(10,10,10,0.85);
  border-bottom: 1px solid var(--border);
}

nav {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
  padding: 16px 0;
}

/* Desktop menu */
.menu {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 28px;
  width: 100%;
  font-size: 18px;
  font-weight: 600;
  flex-wrap: wrap;
}

.menu a {
  position: relative;
  transition: color 0.3s ease;
}

.menu a:hover,
.menu a.active {
  color: var(--gold-2);
}

.menu a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -6px;
  width: 0;
  height: 2px;
  background: var(--gold-2);
  transition: width 0.3s ease;
}

.menu a:hover::after,
.menu a.active::after {
  width: 100%;
}

/* Mobile menu hidden on desktop */
.mobile-menu {
  display: none;
}

/* Mobile */
@media (max-width: 900px) {
  .menu {
    display: none !important;
  }

  .mobile-menu {
    display: block;
    position: relative;
    width: 100%;
  }

  nav {
    justify-content: flex-start;
  }

  #menu-toggle {
    display: none;
  }

  .hamburger {
    display: flex;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
    padding: 10px;
  }

  .hamburger span {
    width: 25px;
    height: 3px;
    background: var(--gold-2);
    border-radius: 3px;
    display: block;
  }

  .mobile-menu-links {
    display: none;
    position: absolute;
    top: 52px;
    left: 0;
    width: 240px;
    background: rgba(10,10,10,0.97);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px;
    box-shadow: var(--shadow);
    z-index: 999;
  }

  .mobile-menu-links a {
    display: block;
    padding: 12px 14px;
    border-radius: 8px;
  }

  .mobile-menu-links a:hover,
  .mobile-menu-links a.active {
    background: rgba(212,175,55,0.12);
    color: var(--gold-2);
  }

  #menu-toggle:checked + .hamburger + .mobile-menu-links {
    display: block;
  }

  .note {
    font-size: 40px;
    color: rgba(247, 215, 116, 0.22);
  }
}
</head>
